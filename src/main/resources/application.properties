spring.application.name=spring-boot-redis
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/dev_orders
spring.datasource.username=Daamu
spring.datasource.password=Damu@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariPool

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=""


# How long to wait when getting a connection from the pool
spring.data.redis.timeout=2000ms
# How long to wait for a command response
spring.data.redis.connect-timeout=2000ms

# ?? LETTUCE POOL (Spring Boot default client is Lettuce, not Jedis)
# Lettuce is thread-safe ? one connection shared, but pool helps under load
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# ?? SPRING CACHE (powers @Cacheable annotations) ?????
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
# 3600000ms = 1 hour ? default TTL for all @Cacheable caches
spring.cache.redis.cache-null-values=false
# Don't cache null ? if DB returns null, next request hits DB again
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=myapp:

# ?? SPRING SESSION (HTTP session stored in Redis) ?????
# Enables session sharing across multiple app instances
spring.session.store-type=redis
spring.session.timeout=30m
spring.session.redis.namespace=spring:session


# ?? LOGGING ??????????????????????????????????????????
logging.level.com.learn.redis=DEBUG
logging.level.org.springframework.data.redis=DEBUG
