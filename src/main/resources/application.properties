spring.application.name=spring-boot-redis
server.port=8081

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:damu123}


# How long to wait when getting a connection from the pool
spring.data.redis.timeout=2000ms
# How long to wait for a command response
spring.data.redis.connect-timeout=2000ms

# ?? LETTUCE POOL (Spring Boot default client is Lettuce, not Jedis)
# Lettuce is thread-safe ? one connection shared, but pool helps under load
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# ?? SPRING CACHE (powers @Cacheable annotations) ?????
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=myapp:

spring.session.store-type=redis
spring.session.timeout=30m
spring.session.redis.namespace=spring:session


logging.level.com.learn.redis=DEBUG
logging.level.org.springframework.data.redis=DEBUG
