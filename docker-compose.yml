services:
  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-damu123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-damu123}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    environment:
        REDIS_ARGS: "--requirepass ${REDIS_STACK_PASSWORD:-redisstack123}"
    ports:
      - "6380:6379"
      - "8001:8001"
    volumes:
      - redis_stack_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_STACK_PASSWORD:-redisstack123}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  redis_data:
  redis_stack_data:
